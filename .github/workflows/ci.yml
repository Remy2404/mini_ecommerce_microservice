---
name: CI

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Create CI environment
        run: |
          cat > .env <<'ENV'
          APP_ENV=ci
          SERVICE_VERSION=0.1.0
          LOG_LEVEL=INFO
          API_GATEWAY_SERVICE_NAME=api-gateway
          API_GATEWAY_PORT=8000
          GATEWAY_AUTH_ENABLED=false
          GATEWAY_REQUEST_TIMEOUT_SECONDS=10
          GATEWAY_RATE_LIMIT_ENABLED=false
          GATEWAY_RATE_LIMIT_PER_MINUTE=60
          WSO2_BASE_URL=https://localhost:9443
          WSO2_ISSUER=https://localhost:9443/oauth2/token
          WSO2_AUDIENCE=mini-ecommerce-api
          WSO2_JWKS_URL=https://localhost:9443/oauth2/jwks
          WSO2_TOKEN_URL=https://localhost:9443/oauth2/token
          WSO2_INTROSPECTION_URL=https://localhost:9443/oauth2/introspect
          WSO2_VERIFY_SSL=false
          WSO2_REQUEST_TIMEOUT_SECONDS=10
          WSO2_CLIENT_ID=ci-client-id
          WSO2_CLIENT_SECRET=ci-client-secret
          JWT_ALGORITHM=RS256
          CORS_ALLOWED_ORIGINS=http://localhost:3000
          AUTH_SERVICE_NAME=auth-service
          PRODUCT_SERVICE_NAME=product-service
          CART_SERVICE_NAME=cart-service
          ORDER_SERVICE_NAME=order-service
          PAYMENT_SERVICE_NAME=payment-service
          AUTH_SERVICE_PORT=8005
          PRODUCT_SERVICE_PORT=8001
          CART_SERVICE_PORT=8002
          ORDER_SERVICE_PORT=8003
          PAYMENT_SERVICE_PORT=8004
          AUTH_SERVICE_URL=http://localhost:8005
          PRODUCT_SERVICE_URL=http://localhost:8001
          CART_SERVICE_URL=http://localhost:8002
          ORDER_SERVICE_URL=http://localhost:8003
          PAYMENT_SERVICE_URL=http://localhost:8004
          RABBITMQ_HOST=localhost
          RABBITMQ_PORT=5672
          RABBITMQ_USER=ecommerce
          RABBITMQ_PASSWORD=ecommerce
          RABBITMQ_VHOST=ecommerce
          RABBITMQ_URL=amqp://ecommerce:ecommerce@localhost:5672/ecommerce
          RABBITMQ_EXCHANGE=ecommerce.events
          ORDER_CREATED_ROUTING_KEY=order.created.v1
          PAYMENT_SUCCESS_ROUTING_KEY=payment.succeeded.v1
          PAYMENT_FAILED_ROUTING_KEY=payment.failed.v1
          ORDER_CONFIRMED_ROUTING_KEY=order.confirmed.v1
          ORDER_CANCELLED_ROUTING_KEY=order.cancelled.v1
          CART_RESTORED_ROUTING_KEY=cart.restored.v1
          ORDER_CREATED_QUEUE=order.created.queue
          PAYMENT_RESULT_QUEUE=payment.result.queue
          CART_RESTORE_QUEUE=cart.restore.queue
          DEAD_LETTER_QUEUE=dead.letter.queue
          RABBITMQ_RETRY_MAX_ATTEMPTS=3
          RABBITMQ_RETRY_DELAY_MS=5000
          RABBITMQ_RETRY_BACKOFF_MULTIPLIER=2.0
          POSTGRES_USER=ecommerce
          POSTGRES_PASSWORD=ecommerce
          POSTGRES_HOST=localhost
          POSTGRES_PORT=15432
          AUTH_DATABASE_NAME=auth_db
          PRODUCTS_DATABASE_NAME=products_db
          ORDERS_DATABASE_NAME=orders_db
          PAYMENTS_DATABASE_NAME=payments_db
          AUTH_DATABASE_URL=postgresql+asyncpg://ecommerce:ecommerce@localhost:15432/auth_db
          PRODUCTS_DATABASE_URL=postgresql+asyncpg://ecommerce:ecommerce@localhost:15432/products_db
          ORDERS_DATABASE_URL=postgresql+asyncpg://ecommerce:ecommerce@localhost:15432/orders_db
          PAYMENTS_DATABASE_URL=postgresql+asyncpg://ecommerce:ecommerce@localhost:15432/payments_db
          VALKEY_HOST=localhost
          VALKEY_PORT=6379
          VALKEY_PASSWORD=
          VALKEY_URL=redis://localhost:6379/0
          OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
          OTEL_EXPORTER_OTLP_PROTOCOL=grpc
          OTEL_EXPORTER_OTLP_HEADERS=
          OTEL_RESOURCE_ATTRIBUTES=service.namespace=mini-ecommerce
          OTEL_TRACES_SAMPLER=parentbased_always_on
          TLS_ENABLED=false
          CERT_VALIDATION_ENABLED=false
          CA_CERT_PATH=certs/ca.pem
          CLIENT_CERT_PATH=certs/client.pem
          CLIENT_KEY_PATH=certs/client-key.pem
          PAYMENT_SUCCESS_RATE=0.9
          PAYMENT_MIN_DELAY_MS=1
          PAYMENT_MAX_DELAY_MS=1
          PRODUCT_CACHE_TTL_SECONDS=300
          CART_CACHE_TTL_SECONDS=300
          RATE_LIMIT_TTL_SECONDS=60
          RATE_LIMIT_ENABLED=false
          RATE_LIMIT_REQUESTS_PER_MINUTE=60
          ENV

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest

      - name: Docker compose validation
        run: docker compose -f infra/docker-compose.yml config --quiet

      - name: Smoke and E2E tests
        run: uv run pytest tests/smoke tests/e2e
