services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ecommerce-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ecommerce
      RABBITMQ_DEFAULT_PASS: ecommerce
      RABBITMQ_DEFAULT_VHOST: ecommerce
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - ecommerce-net

  valkey:
    image: valkey/valkey:8.1.7
    container_name: ecommerce-valkey
    ports:
      - '6379:6379'
    command: ['valkey-server', '/usr/local/etc/valkey/valkey.conf']
    volumes:
      - valkey-data:/data
      - ./valkey/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - ecommerce-net

  postgres-primary:
    image: postgres:16
    container_name: ecommerce-postgres-primary
    ports:
      - '15432:5432'
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
      POSTGRES_DB: ecommerce
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ecommerce -d ecommerce']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - ecommerce-net

  postgres-replica:
    image: postgres:16
    container_name: ecommerce-postgres-replica
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
      POSTGRES_DB: ecommerce
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ecommerce -d ecommerce']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - ecommerce-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    container_name: ecommerce-otel-collector
    command: ['--config=/etc/otel-collector-config.yml']
    volumes:
      - ./otel/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - '4317:4317'
      - '4318:4318'
      - '8889:8889'
    depends_on:
      - jaeger
    networks:
      - ecommerce-net

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: ecommerce-jaeger
    ports:
      - '16686:16686'
      - '14250:14250'
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    networks:
      - ecommerce-net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: ecommerce-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - ecommerce-net

  grafana:
    image: grafana/grafana:11.0.0
    container_name: ecommerce-grafana
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - ecommerce-net

  wso2:
    image: wso2/wso2is:7.0.0
    container_name: ecommerce-wso2
    ports:
      - '9443:9443'
    profiles:
      - identity
    networks:
      - ecommerce-net

  k6-load-test:
    image: grafana/k6:latest
    container_name: ecommerce-k6-load-test
    profiles:
      - loadtest
    working_dir: /work
    volumes:
      - ..:/work
    environment:
      BASE_URL: http://api-gateway:8000
      AUTH_TOKEN: ${AUTH_TOKEN:-}
      USER_ID: ${USER_ID:-load-user}
      PRODUCT_ID: ${PRODUCT_ID:-00000000-0000-0000-0000-000000000001}
      K6_PRODUCT_VUS: ${K6_PRODUCT_VUS:-5}
      K6_PRODUCT_DURATION: ${K6_PRODUCT_DURATION:-30s}
      K6_ORDER_RATE: ${K6_ORDER_RATE:-2}
      K6_ORDER_DURATION: ${K6_ORDER_DURATION:-30s}
    command:
      [
        'run',
        'tests/load/k6_ecommerce.js',
      ]
    networks:
      - ecommerce-net

volumes:
  rabbitmq-data:
  valkey-data:
  postgres-primary-data:
  postgres-replica-data:
  grafana-data:

networks:
  ecommerce-net:
    driver: bridge
