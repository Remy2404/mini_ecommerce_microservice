services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: ecommerce-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY_ID:-MinioAdmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-MinioAdmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - ecommerce-net
volumes:
  minio-data:

networks:
  ecommerce-net:
    driver: bridge